<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemical Computing — Reference Sheet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f4f1eb;
    font-family: 'DM Mono', monospace;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 48px 32px;
  }

  .page {
    max-width: 960px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
    padding-bottom: 32px;
  }

  header::after {
    content: '';
    display: block;
    width: 64px;
    height: 2px;
    background: #1a1a1a;
    margin: 24px auto 0;
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    font-weight: 400;
    line-height: 1.2;
    color: #1a1a1a;
    margin-bottom: 8px;
  }

  h1 em {
    font-style: italic;
    color: #555;
  }

  .subtitle {
    font-size: 11px;
    color: #888;
    letter-spacing: 0.05em;
    margin-top: 6px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .card {
    background: #fff;
    border: 1px solid #e0dbd0;
    border-radius: 4px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: box-shadow 0.2s, transform 0.2s;
  }

  .card:hover {
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .ref-num {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: #bbb;
    padding-top: 2px;
    min-width: 24px;
  }

  .ref-title {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    line-height: 1.5;
    color: #1a1a1a;
    font-weight: 400;
  }

  .ref-authors {
    font-size: 10px;
    color: #777;
    letter-spacing: 0.03em;
  }

  .ref-venue {
    font-size: 10px;
    color: #999;
    font-style: italic;
  }

  .qr-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f9f8f5;
    border: 1px solid #ede9e0;
    border-radius: 3px;
    padding: 12px;
  }

  .qr-wrap canvas, .qr-wrap img {
    display: block;
  }

  .doi-text {
    font-size: 9px;
    color: #aaa;
    text-align: center;
    letter-spacing: 0.04em;
    word-break: break-all;
  }

  footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid #ddd8cc;
    font-size: 10px;
    color: #bbb;
    letter-spacing: 0.08em;
  }

  @media print {
    body { background: white; padding: 24px; }
    .card { break-inside: avoid; }
    .card:hover { box-shadow: none; transform: none; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <p class="label">Academic Reference Sheet</p>
    <h1>Chemical <em>Computing</em></h1>
    <p class="subtitle">Scan any QR code to access the paper directly via DOI</p>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    CHEMICAL COMPUTING &nbsp;·&nbsp; 7 REFERENCES &nbsp;·&nbsp; SCAN TO ACCESS
  </footer>

</div>

<script>
const refs = [
  { n:"01", title:"A programmable chemical computer with memory and pattern recognition", authors:"J. M. Parrilla-Gutierrez et al.", venue:"Nat. Commun., vol. 11, 2020", doi:"https://doi.org/10.1038/s41467-020-15190-3" },
  { n:"02", title:"Chemical memory with states coded in light-controlled oscillations of interacting Belousov–Zhabotinsky droplets", authors:"K. Gizynski & J. Gorecki", venue:"Phys. Chem. Chem. Phys., vol. 19, 2017", doi:"https://doi.org/10.1039/C6CP07492H" },
  { n:"03", title:"Native chemical computation. A generic application of oscillating chemistry illustrated with the BZ reaction", authors:"M. Dueñas-Díez & J. Pérez-Mercader", venue:"Front. Chem., vol. 9, 2021", doi:"https://doi.org/10.3389/fchem.2021.611120" },
  { n:"04", title:"Chemical computing with reaction–diffusion processes", authors:"J. Gorecki et al.", venue:"Philos. Trans. R. Soc. A, vol. 373, 2015", doi:"https://doi.org/10.1098/rsta.2014.0219" },
  { n:"05", title:"Information processing using networks of chemical oscillators", authors:"J. Gorecki", venue:"Entropy, vol. 24, 2022", doi:"https://doi.org/10.3390/e24081054" },
  { n:"06", title:"Programming weakly connected chemical oscillators to simulate logic gates and cellular automata", authors:"J. M. Parrilla-Gutierrez, A. Sharma, S. Tsuda & L. Cronin", venue:"Proc. ALife 2024, MIT Press", doi:"https://doi.org/10.1162/isal_a_00803" },
  { n:"07", title:"Real-time signal processing via chemical reactions for a microfluidic molecular communication system", authors:"V. Walter et al.", venue:"Nat. Commun., vol. 14, 2023", doi:"https://doi.org/10.1038/s41467-023-42885-0" },
];

const grid = document.getElementById("grid");

refs.forEach(r => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-top">
      <span class="ref-num">[${r.n}]</span>
      <span class="ref-title">${r.title}</span>
    </div>
    <div>
      <div class="ref-authors">${r.authors}</div>
      <div class="ref-venue">${r.venue}</div>
    </div>
    <div class="qr-wrap" id="qr-${r.n}"></div>
    <div class="doi-text">${r.doi.replace('https://doi.org/','doi.org/')}</div>
  `;
  grid.appendChild(card);

  new QRCode(document.getElementById(`qr-${r.n}`), {
    text: r.doi,
    width: 120,
    height: 120,
    colorDark: "#1a1a1a",
    colorLight: "#f9f8f5",
    correctLevel: QRCode.CorrectLevel.M
  });
});
</script>
</body>
</html>
